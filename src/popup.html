<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>JP Reader</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <div class="title">JP Reader</div>
    <table>
      <tbody>
        <tr>
          <td><label for="enabled">Enabled</label></td>
          <td><input id="enabled" type="checkbox"/></td>
        </tr>
        <tr>
          <td><label for="anki-enabled">Anki Vocab Annotation</label></td>
          <td><input id="anki-enabled" type="checkbox"/></td>
        </tr>
        <tr>
          <td><label for="anki-kanji-enabled">Anki Kanji Annotation</label></td>
          <td><input id="anki-kanji-enabled" type="checkbox"/></td>
        </tr>
        <tr>
          <td><label for="furigana">Furigana</label></td>
          <td>
            <select id="furigana">
              <option value="0">Disabled</option>
              <option value="1">ひらがな</option>
              <option value="2">カタカナ</option>
              <option value="3">Romaji</option>
            </select>
          </td>
        </tr>
        <tr>
          <td><label for="anki-url">AnkiConnect URL</label></td>
          <td>
            <input
              id="anki-url"
              type="text"
              placeholder="http://127.0.0.1:8765"
            />
          </td>
          <td><div class="bulb" id="anki-connect-status"></div></td>
        </tr>
        <tr class="anki-enabled-options">
          <td><label for="anki-query">Anki query</label></td>
          <td>
            <input id="anki-query" type="text" placeholder="note:JP Vocab" />
          </td>
        </tr>
        <tr class="anki-enabled-options">
          <td><label for="anki-expression-field">Anki Expression field</label></td>
          <td>
            <input
              id="anki-expression-field"
              type="text"
              placeholder="Expression"
            />
          </td>
        </tr>
        <tr class="anki-kanji-enabled-options">
          <td><label for="anki-kanji-query">Anki Kanji query</label></td>
          <td>
            <input id="anki-kanji-query" type="text" placeholder="note:JP Kanji" />
          </td>
        </tr>
        <tr class="anki-kanji-enabled-options">
          <td><label for="anki-kanji-field">Anki Kanji field</label></td>
          <td>
            <input
              id="anki-kanji-field"
              type="text"
              placeholder="Kanji"
            />
          </td>
        </tr>
      </tbody>
    </table>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
